<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: #fff;
  }

  .container {
    padding: 16px;
    max-width: 900px;
    margin: auto;
  }

  .card {
    background:khaki;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  input, textarea, button {
    width: 100%;
    box-sizing: border-box;
    border-radius: 8px;
    border: none;
    margin-top: 10px;
  }

  textarea {
    padding: 10px;
    font-size: 14px;
  }

  button {
    padding: 12px;
    background: linear-gradient(90deg, #22c55e, #16a34a);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.02);
    opacity: 0.9;
  }

  .score-box {
    text-align: center;
    margin-top: 20px;
  }

  .score-circle {
    width: 120px;
    height: 120px;
    margin: auto;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    background: conic-gradient(
      #22c55e calc(var(--score) * 1%),
      #334155 0
    );
  }

  .section {
    margin-top: 20px;
  }

  .section h3 {
    margin-bottom: 8px;
  }

  .list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 6px 10px;
    border-radius: 20px;
    font-size: 13px;
  }

  .good {
    background: #22c55e;
  }

  .bad {
    background: #ef4444;
  }

  .neutral {
    background: #facc15;
    color: black;
  }

  /* 📱 Mobile */
  @media (max-width: 600px) {
    .score-circle {
      width: 90px;
      height: 90px;
      font-size: 20px;
    }
  }
</style>

<div class="container">
  <div class="card">

    <h2>🚀 AI Resume Analyzer</h2>

    <input type="file" (change)="onFileChange($event)" />

    <textarea
      rows="5"
      [(ngModel)]="jobDescription"
      placeholder="Paste Job Description">
    </textarea>

    <button (click)="upload()" [disabled]="loading">
      {{ loading ? 'Analyzing...' : 'Analyze Resume' }}
    </button>

    <div *ngIf="result">

      <!-- SCORE -->
      <div class="score-box">
        <div class="score-circle" [style.--score]="result.score">
          {{ result.score }}
        </div>
        <p>Match Score</p>
      </div>

      <!-- MATCHED SKILLS -->
      <div class="section">
        <h3>✅ Matching Skills</h3>
        <div class="list">
          <span class="chip good" *ngFor="let skill of result.matched_skills">
            {{ skill }}
          </span>
        </div>
      </div>

      <!-- MISSING SKILLS -->
      <div class="section">
        <h3>⚠️ Missing Skills</h3>
        <div class="list">
          <span class="chip neutral" *ngFor="let skill of result.missing_skills">
            {{ skill }}
          </span>
        </div>
      </div>

      <!-- GOOD REASONS -->
      <div class="section">
        <h3>👍 Why Good Match</h3>
        <div class="list">
          <span class="chip good" *ngFor="let item of result.good_match_reasons">
            {{ item }}
          </span>
        </div>
      </div>

      <!-- BAD REASONS -->
      <div class="section">
        <h3>👎 Why Bad Match</h3>
        <div class="list">
          <span class="chip bad" *ngFor="let item of result.bad_match_reasons">
            {{ item }}
          </span>
        </div>
      </div>

    </div>

  </div>
</div>
